<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <meta name="theme-color" content="#1b2a41" />
  <title>Pocket Games</title>
  <link rel="stylesheet" href="./styles.css" />
</head>
<body>
  <header class="site-header">
    <h1>Pocket Games</h1>
    <p class="tagline">A tiny collection of browser games for your phone.</p>
    <div class="player-bar">
      <label for="player-name">Player</label>
      <input id="player-name" type="text" autocomplete="off" maxlength="20" placeholder="Anonymous" />
    </div>
  </header>

  <main class="game-grid">
    <a class="game-card" href="./games/tiles/">
      <div class="game-thumb" id="thumb-tiles" aria-hidden="true"></div>
      <div class="game-meta">
        <h2>Azulejo Tiles</h2>
        <p>Match the topmost pattern on each tile to clear the board. Beat the clock.</p>
      </div>
    </a>

    <div class="game-card coming-soon" aria-disabled="true">
      <div class="game-thumb placeholder" aria-hidden="true">?</div>
      <div class="game-meta">
        <h2>More soon</h2>
        <p>New games will appear here.</p>
      </div>
    </div>
  </main>

  <footer class="site-footer">
    <small>All progress is saved locally in your browser.</small>
  </footer>

  <script>
    // Shared: player name persisted across the site.
    const KEY = 'pocketgames.playerName';
    const input = document.getElementById('player-name');
    input.value = localStorage.getItem(KEY) || '';
    input.addEventListener('change', () => {
      localStorage.setItem(KEY, input.value.trim());
    });
    input.addEventListener('blur', () => {
      localStorage.setItem(KEY, input.value.trim());
    });
  </script>

  <script type="module">
    // Tiles thumbnail: a mini board drawn from the same patterns & palette
    // the actual game uses, so it always reflects the current catalogue.
    import { PATTERN_POOL, COLOR_PALETTE } from './games/tiles/patterns.js';
    const thumb = document.getElementById('thumb-tiles');
    if (thumb) {
      const COLS = 8, ROWS = 5;
      const CELL = 100;
      const GAP = 2;
      const FACE = CELL - GAP;
      const FACE_SCALE = FACE / CELL;
      const W = COLS * CELL, H = ROWS * CELL;
      const pick = (arr) => arr[Math.floor(Math.random() * arr.length)];
      let svg = `<svg viewBox="0 0 ${W} ${H}" preserveAspectRatio="xMidYMid slice" xmlns="http://www.w3.org/2000/svg">`;
      svg += `<rect width="${W}" height="${H}" fill="#1b2a41"/>`;
      for (let r = 0; r < ROWS; r++) {
        for (let c = 0; c < COLS; c++) {
          const p = pick(PATTERN_POOL);
          const col = pick(COLOR_PALETTE);
          const tx = c * CELL + GAP / 2;
          const ty = r * CELL + GAP / 2;
          svg += `<g transform="translate(${tx} ${ty}) scale(${FACE_SCALE})">`
              +    `<rect width="100" height="100" fill="#fdf6e3"/>`
              +    p.render(col)
              +  `</g>`;
        }
      }
      svg += `</svg>`;
      thumb.innerHTML = svg;
    }
  </script>
</body>
</html>
